services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    # Map the container to the host gateway to access the native Ollama service.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Point Open WebUI to the host machine's Ollama port.
      - OLLAMA_BASE_URL=http://host.docker.internal:${OLLAMA_PORT:-11434}
    volumes:
      - ./data/open-webui:/app/backend/data
    networks:
      - loki-net

  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    restart: always
    ports:
      # Expose standard web traffic port to the local network.
      - "${CADDY_PORT:-80}:80"
    volumes:
      # Mount the configuration file to define routing rules.
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - loki-net

  kiwix-serve:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: kiwix-local
    volumes:
      # Mount the local directory to the container data folder.
      - ./data/kiwix:/data
    ports:
      - "${KIWIX_PORT:-8080}:8080"
    command:
      # Serve all archives found in the mounted directory.
      - "/data/*.zim"
    networks:
      # Attach to the custom loki-net bridge so Open WebUI can see it.
      - loki-net
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  loki-net:
    driver: bridge
